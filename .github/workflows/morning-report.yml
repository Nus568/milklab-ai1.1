name: Morning Report

on:
  schedule:
    # รันเวลา 01:00 UTC (เท่ากับ 08:00 เช้าเวลาไทย)
    - cron: '0 1 * * *'
  workflow_dispatch: # ทำให้เรามีปุ่มกดรันเองได้บนเว็บ GitHub

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install gspread oauth2client requests

      - name: Decode Google Credentials
        # แปลงไฟล์ความลับที่เก็บไว้ใน GitHub คืนกลับมาเป็นไฟล์ .json
        run: echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}" | base64 --decode > credentials.json

      - name: Run Logger / Report
        env:
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # รันสคริปต์เพื่อแจ้งเตือน (ทดสอบการทำงาน)
        run: python scripts/sales_logger.py --menu "Daily Check" --qty 1 --price 0